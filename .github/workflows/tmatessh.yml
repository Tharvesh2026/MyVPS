name: Tmate Ubuntu VPS

on:
  workflow_dispatch:

jobs:
  vps:
    name: Ubuntu VPS
    runs-on: ubuntu-latest

    steps:

      # 1. Install Java 21
      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      # 2. Install SSH server
      - name: Install SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server

          sudo systemctl start ssh
          sudo systemctl enable ssh


      # 3. Create SSH user
      - name: Create user tharvesh
        run: |

          sudo useradd \
          -m \
          -s /bin/bash \
          tharvesh || true


          echo "tharvesh:200512" | sudo chpasswd


          sudo usermod -aG sudo tharvesh


          sudo sed -i \
          's/#PasswordAuthentication yes/PasswordAuthentication yes/' \
          /etc/ssh/sshd_config


          sudo sed -i \
          's/PasswordAuthentication no/PasswordAuthentication yes/' \
          /etc/ssh/sshd_config


          sudo systemctl restart ssh


          echo "User created:"
          id tharvesh


      # 4. Install tmate
      - name: Install tmate
        run: |
          sudo apt update
          sudo apt install -y tmate


      # 5. Create Termius SSH access
      - name: Start tmate SSH session
        run: |

          tmate \
          -S /tmp/tmate.sock \
          new-session \
          -d


          tmate \
          -S /tmp/tmate.sock \
          wait tmate-ready


          echo "================================="
          echo "TERMius SSH CONNECTION"
          echo "================================="


          tmate \
          -S /tmp/tmate.sock \
          display \
          -p '#{tmate_ssh}'


          echo ""
          echo "Linux username:"
          echo "tharvesh"

          echo "Password:"
          echo "200512"


      # 6. Keep VPS alive
      - name: Keep VPS Alive
        run: |

          echo "================================="
          echo "Temporary Ubuntu VPS Running"
          echo "Java 21 Installed"
          echo "SSH User: tharvesh"
          echo "================================="


          while true
          do
            sleep 300
          done
